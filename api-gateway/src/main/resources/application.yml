server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**, /v3/api-docs/user-service/**
          filters:
            - name: CircuitBreaker
              args:
                name: ecommerceCircuitBreaker
                fallbackUri: forward:/fallback
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**, /v3/api-docs/product-service/**
          filters:
            - name: CircuitBreaker
              args:
                name: productServiceCircuitBreaker
                fallbackUri: forward:/fallback
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**, /v3/api-docs/order-service/**
          filters:
            - name: CircuitBreaker
              args:
                name: orderServiceCircuitBreaker
                fallbackUri: forward:/fallback
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**, /v3/api-docs/payment-service/**
          filters:
            - name: CircuitBreaker
              args:
                name: paymentServiceCircuitBreaker
                fallbackUri: forward:/fallback
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**, /v3/api-docs/notification-service/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCircuitBreaker
                fallbackUri: forward:/fallback
      discovery:
        locator:
          enabled: false # Explicit routes preferred
          lower-case-service-id: true

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, tracing

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      minimumNumberOfCalls: 5
      permittedNumberOfCallsInHalfOpenState: 3
      failureRateThreshold: 50
      slowCallRateThreshold: 50
      slowCallDurationThreshold: 3s
      waitDurationInOpenState: 10s
      registerHealthIndicator: true
  instances:
    ecommerceCircuitBreaker:
      baseConfig: default
    productServiceCircuitBreaker:
      baseConfig: default
    orderServiceCircuitBreaker:
      baseConfig: default
    paymentServiceCircuitBreaker:
      baseConfig: default
    notificationServiceCircuitBreaker:
      baseConfig: default

resilience4j.retry:
  configs:
    default:
      maxAttempts: 3
      waitDuration: 500ms
      enableExponentialBackoff: true
      exponentialBackoffMultiplier: 2
  instances:
    ecommerceRetry:
      baseConfig: default

spring.cloud.gateway.default-filters:
  - name: Retry
    args:
      retries: 3
      methods: GET,POST
      backoff:
        firstBackoff: 500ms
        maxBackoff: 2000ms
        factor: 2
        basedOnPreviousValue: false
